when:
  - event: cron
    cron: term-snapshot

steps:
  - name: record-term
    image: node:22-alpine
    commands:
      - node scripts/record-term-today.js

  - name: commit-and-push
    image: alpine/git
    environment:
      GITEA_TOKEN:
        from_secret: GITEA_TOKEN
    commands:
      - git config user.email "ci@heterarchy.fyi"
      - git config user.name "Woodpecker CI"
      - git add src/lib/data/term-history.csv
      - git diff --staged --quiet && echo "Nothing to commit" && exit 0
      - 'git commit -m "chore: record term of day $(date +%Y-%m-%d)"'
      - git remote set-url origin https://woodpecker:$GITEA_TOKEN@git.heterarchy.fyi/heterarchy-society/heterarchy.fyi.git
      - git push origin HEAD:main
