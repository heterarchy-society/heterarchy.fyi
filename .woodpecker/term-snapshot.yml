when:
  - event: cron
    cron: term-snapshot

steps:
  - name: fetch-data
    image: node:22-alpine
    commands:
      - node scripts/fetch-data.js

  - name: record-term
    image: node:22-alpine
    commands:
      - node scripts/record-term-today.js

  - name: commit-and-push
    image: alpine/git
    commands:
      - git config user.email "ci@heterarchy.fyi"
      - git config user.name "Woodpecker CI"
      - printf "machine %s\nlogin %s\npassword %s\n" "$CI_NETRC_MACHINE" "$CI_NETRC_USERNAME" "$CI_NETRC_PASSWORD" >> ~/.netrc
      - chmod 600 ~/.netrc
      - git add src/lib/data/term-history.csv
      - git diff --staged --quiet && echo "Nothing to commit" && exit 0
      - 'git commit -m "chore: record term of day $(date +%Y-%m-%d)"'
      - git push origin HEAD:main
