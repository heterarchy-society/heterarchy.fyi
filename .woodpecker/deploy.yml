when:
  - event: push
    branch: main
  - event: pull_request
  - event: manual

steps:
  - name: build
    image: oven/bun:1
    commands:
      - bun install --frozen-lockfile
      - bun run check
      - bun run build

  - name: deploy
    image: rclone/rclone:latest
    when:
      - event: push
        branch: main
    depends_on: [build]
    environment:
      DEPLOY_PASSWORD:
        from_secret: DEPLOY_SECRET
    commands:
      - touch ipfs-trigger.flag
      - rclone sync build/ ipfs-trigger.flag ":sftp,host=sftpgo.heterarchy.fyi,port=2222,user=heterarchy,pass=$DEPLOY_PASSWORD:/public/heterarchy.fyi" -v
